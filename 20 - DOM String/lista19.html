<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista 19</title>
</head>

<body>

    <h1 style="text-align: center;">Lista 19 - DOM String </h1>
    <h2>1 - Nome em Minúsculo</h2>
    <input type="text" id="nome" placeholder="Digite o nome">
    <button onclick="converter()">Converter</button>
    <p id="resultado1"></p>

    <br>

    <h2>2 - Quantidade de Letras do Nome</h2>

    <input type="text" id="texto" placeholder="Digite o nome">
    <button onclick="mudar()">Mudar</button>

    <p id="letras"></p>

    <br>

    <h2>3 - Mostrar Última Letra</h2>

    <input type="text" id="palavra">
    <button onclick="parte()">Mostrar última letra</button>
    <p id="resultado3"></p>
    <p id="final3"></p>

    <br>

    <h2>4 - Mostrar Primeiras 4 Letras</h2>

    <input type="text" id="palavra4">
    <button onclick="letras()">Mostrar última letra</button>
    <p id="resultado4"></p>
    <p id="final4"></p>

    <br>

    <h2>5 - Mostrar Últimas 3 Letras</h2>
    <input type="text" id="palavra5">
    <button onclick="ultimasLetras()">Mostrar últimas 3 letras</button>
    <p id="resultado5"></p>
    <p id="final5"></p>

    <br>

    <h2>6 - Nome e Sobrenome</h2>

    <input type="text" id="bt1" placeholder="Digite o nome">
    <input type="text" id="bt2" placeholder="Digite o sobrenome">
    <button onclick="juntar()">Mostrar nome completo</button>
    <p id="juntos"></p>

    <br>

    <h2>7 - Primeira Letra em Destaque</h2>
    <input type="text" id="nome7" placeholder="Digite o nome">
    <button onclick="clique()">Clique</button>
    <p id="frase"></p>

    <br>

    <h2>8 - Mensagem com Nome Formatado</h2>
    <input type="text" id="nome3" placeholder="Digite o nome">
    <button onclick="bemVindo()">Entrar</button>
    <p id="mensagem"></p>

    <br>

    <h2>9 - Verificar Nome Curto ou Longo</h2>
    <input type="text" id="nome4" placeholder="Digite o nome">
    <button onclick="verificar()">Verificar</button>
    <p id="contagem"></p>

    <script src="lista19.js"></script>
</body>
