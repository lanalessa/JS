<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Reservas</title>
    <link rel="stylesheet" href="cadastro.css">
</head>
<body>
    <div class="container">
        <div class="form-wrapper">
            <h1>Cadastro de Reservas</h1>
            <p class="subtitle">Preencha os dados abaixo para fazer sua reserva</p>
            
            <form id="formularioReserva" novalidate>
                <div class="form-group">
                    <label for="nome">Nome *</label>
                    <input type="text" id="nome" name="nome" placeholder="Digite seu nome completo" required>
                    <span class="erro" id="erroNome"></span>
                </div>

                <div class="form-group">
                    <label for="quantidade">Quantidade de Pessoas *</label>
                    <input type="number" id="quantidade" name="quantidade" min="1" max="50" placeholder="Digite a quantidade" required>
                    <span class="erro" id="erroQuantidade"></span>
                </div>

                <div class="form-group">
                    <label for="email">E-mail *</label>
                    <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required>
                    <span class="erro" id="erroEmail"></span>
                </div>

                <div class="form-group">
                    <label for="celular">Celular *</label>
                    <input type="tel" id="celular" name="celular" placeholder="(XX) XXXXX-XXXX" required>
                    <span class="erro" id="erroCelular"></span>
                </div>

                <div class="form-group">
                    <label for="data">Data da Reserva</label>
                    <input type="date" id="data" name="data">
                </div>

                <button type="submit" class="btn-enviar">Fazer Reserva</button>
                <button type="reset" class="btn-limpar">Limpar</button>
            </form>

            <div class="mensagem" id="mensagem" style="display: none;"></div>
        </div>
    </div>

    <script src="cadastro.js"></script>
</body>
</html>
