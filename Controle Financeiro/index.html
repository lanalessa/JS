<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle Financeiro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="container">
        <div class="section-header">
            <h1>Controle Financeiro</h1>
        </div>
        <p class="subtitle">Monitore entradas, saídas e saldo com clareza para tomar decisões melhores.</p>

        <hr><br>

        <div class="resumo">

            <div class="entrada">
                <h3>Entrada</h3>
                <p id="totalEntrada">R$ 00.00</p>
                <span class="small-text">0 registros</span>
            </div>

            <div class="saida">
                <h3>Saída</h3>
                <p id="totalSaida">R$00.00</p>
                <span class="small-text">0 registros</span>
            </div>

            <div class="saldo">
                <h3>Saldo</h3>
                <p id="totalSaldo">R$ 00.00</p>
            </div>

        </div>

        <form id="formulario">
            <input type="text" id="descricao" placeholder="Descrição" required> 
                <!-- required para não deixar o campo vazio Obrigatório -->
            <input type="number" id="valor" placeholder="Valor" required>

            <select id="tipo" required>
                <option value="">Selecione o tipo</option>
                <option value="entrada">Entrada</option>
                <option value="saida">Saída</option>
            </select>
            <button type="submit">Adicionar</button>

        </form>

        <div class="contador-resumo">
            <div class="contador-card">
                <h4>Entradas</h4>
                <p id="contEntradaCard">0 registros</p>
            </div>
            <div class="contador-card">
                <h4>Saídas</h4>
                <p id="contSaidaCard">0 registros</p>
            </div>
            <div class="contador-card">
                <h4>Total</h4>
                <p id="totalMovimentacoes">0</p>
            </div>
        </div>

        <ul id="listagem"></ul>

    </section>
    
    <script src="script.js"></script>
</body>
</html>
